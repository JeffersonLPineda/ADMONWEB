<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Bytech</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .resumen-pago { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .item-carrito { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
        .metodos-pago { margin-top: 20px; }
        .opcion-pago { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; }
        .total-box { font-size: 1.5rem; font-weight: bold; margin-top: 20px; display: flex; justify-content: space-between; }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<!-- POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h2 id="popup-title">Mensaje</h2>
        <p id="popup-text"></p>
        <button class="btn" onclick="cerrarPopup()">Aceptar</button>
    </div>
</div>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">By<span>Tech</span></a>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Sobre Nosotros</a></li>
                <li><a href="productos.html">Catálogo</a></li>
                <li><a href="checkout.html" class="active">Carrito (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">Finalizar tu Pedido</h1>
        
        <div class="checkout-container">
            <section class="resumen-pago">
                <h3>Método de Pago</h3>
                <form id="form-pago" onsubmit="procesarPago(event)">
                    <div class="metodos-pago">
                        <label class="opcion-pago">
                            <input type="radio" name="pago" value="tarjeta" checked>
                            <div><strong>Tarjeta de Crédito / Débito</strong><br><small>Visa, Mastercard, AMEX</small></div>
                        </label>
                        <label class="opcion-pago">
                            <input type="radio" name="pago" value="paypal">
                            <div><strong>PayPal</strong><br><small>Paga de forma segura con tu cuenta</small></div>
                        </label>
                        <label class="opcion-pago">
                            <input type="radio" name="pago" value="transferencia">
                            <div><strong>Transferencia Bancaria</strong><br><small>El pedido se procesará al confirmar el depósito</small></div>
                        </label>
                    </div>
                    
                    <h3 style="margin-top: 25px;">Datos de Envío</h3>
                    <input type="text" placeholder="Nombre completo" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="email" placeholder="Correo electrónico" required style="width:100%; padding:10px; margin-bottom:20px;">
                    
                    <button type="submit" id="btn-finalizar" class="btn" style="width: 100%; padding: 15px;">PAGAR AHORA</button>
                </form>
            </section>

            <aside class="resumen-pago">
                <h3>Resumen de Compra</h3>
                <div id="lista-carrito">
                    </div>
                <div class="total-box">
                    <span>Total:</span>
                    <span id="total-precio">Q0</span>
                </div>
            </aside>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
